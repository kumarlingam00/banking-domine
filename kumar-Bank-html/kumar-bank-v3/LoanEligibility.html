<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Eligibility </title>
</head>
<body>
    <header>
        <center>
            <h1>Loan Eligibility Check</h1>
        </center>
    </header>
    <main>
        <center>
        <form>
            <label> Name </label>
            <input type="text">
            <br>
            <label> Annual Income </label>
            <input type="number">
            <br>
            <label> Existing EMI </label>
            <input type="number">
            <br>
            <label> Employment </label>
            <input type="radio" value="Salaried"> Salaried
            <input type="radio" value="Bussiness"> Bussiness
            <br>
            <label> Loan Type </label>
            <select>
                <option value="select"> Select </option>
                <option value="Home"> Home</option>
                <option value="Persanol" > Personal </option>
                <option value="Education"> Education </option>
                <option value="Gold"> Gold </option>
            </select>
            <br>
            <label> Loan Amount </label>
            <input type="text">
            <br>
            <label> Start Date </label>
            <input type="date">
            <br>
            <label> Purpose </label>
            <textarea rows="3" cols="18"></textarea>
            <br>
            <input type="submit" value="Check Eligibility">
        </form>
        </center>
    </main>
    <footer>

    </footer>
</body>
</html>
